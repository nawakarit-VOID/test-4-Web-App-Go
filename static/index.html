<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My App</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

  <div class="bg-white p-8 rounded-2xl shadow-lg w-80">

    <h1 data-key="title" class="text-2xl font-bold text-center mb-4"></h1>

    <input id="name" data-key="name_placeholder"
      class="border w-full p-2 rounded mb-3">

    <button onclick="sendData()" data-key="send"
      class="bg-blue-500 hover:bg-blue-600 text-white w-full py-2 rounded mb-3">
    </button>

    <h2 id="result" class="text-center text-green-600 font-semibold"></h2>

    <div class="flex justify-center gap-2 mt-4">
      <button onclick="setLang('th')" class="text-sm">🇹🇭</button>
      <button onclick="setLang('en')" class="text-sm">🇺🇸</button>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
