<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My First Web App</title>
</head>
<body>

  <h1 id="text">กดปุ่มด้านล่าง</h1>
  <button onclick="callAPI()">กดฉัน</button>
  <button onclick="callAPI()"data-key="push"></button>

<input id="name" data-key="name_placeholder" data-type="placeholder">

<button onclick="sendData()" data-key="send"></button>

<h1 id="result">ผลลัพธ์จะอยู่ตรงนี้</h1>

<h1 data-key="title"></h1>

<button data-key="button"></button>

<hr>

<button onclick="setLang('th')">ไทย</button>
<button onclick="setLang('en')">English</button>

<script src="lang.js"></script>


  <script>
    function callAPI() {
      fetch("/api/hello")
        .then(res => res.json())
        .then(data => {
          document.getElementById("text").innerText = data.message
        })
    }

function sendData() {
  const name = document.getElementById("name").value

  fetch("/api/post", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name: name })
  })
  .then(res => res.json())
  .then(data => {
    // 👇 เอามาแสดงตรงนี้
    document.getElementById("result").innerText = data.reply
  })
}
  </script>

</body>
</html>
