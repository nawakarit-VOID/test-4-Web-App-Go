<!DOCTYPE html>
<html class="">
<head>
  <meta charset="UTF-8">


  <!-- bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body data-bs-theme="light"></body>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

  <div class="card p-4 shadow" style="width: 300px;">

    <h2 data-key="title" class="text-center mb-3"></h2>

    <input id="name" data-key="name_placeholder"
      class="form-control mb-3">

    <button onclick="sendData()" data-key="send"
      class="btn btn-primary w-100 mb-3">
    </button>

    <h5 id="result" class="text-center text-success"></h5>

    <div class="d-flex justify-content-center gap-2 mt-3">
      <button onclick="setLang('th')" class="btn btn-sm btn-outline-secondary">🇹🇭</button>
      <button onclick="setLang('en')" class="btn btn-sm btn-outline-secondary">🇺🇸</button>
      <button onclick="toggleDark()" class="btn btn-sm btn-secondary mt-2">
  🌙 / ☀️
</button>
    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
